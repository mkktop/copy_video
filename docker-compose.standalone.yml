version: '3.8'

# Copy Video - 使用预构建镜像的部署配置
# 将镜像地址替换为你发布到 Docker Hub 的镜像地址

services:
  # Backend - FastAPI with FFmpeg
  backend:
    image: your-username/copy-video-backend:latest  # 替换为你的镜像
    container_name: copy-video-backend
    volumes:
      - ./data/workspace:/app/workspace
      - ./data/db:/app/data
    environment:
      - PYTHONUNBUFFERED=1
      - TZ=Asia/Shanghai  # 时区设置
    restart: unless-stopped
    networks:
      - copy-video-network

  # Frontend - Vue.js SPA
  frontend:
    image: your-username/copy-video-frontend:latest  # 替换为你的镜像
    container_name: copy-video-frontend
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - copy-video-network

  # Nginx - Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: copy-video-nginx
    ports:
      - "3799:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - copy-video-network

networks:
  copy-video-network:
    driver: bridge
