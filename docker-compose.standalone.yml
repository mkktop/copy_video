version: '3.8'

# Copy Video - 使用预构建镜像的部署配置
#
# 使用方法:
# 1. 将 YOUR_USERNAME 替换为你的 Docker Hub 用户名
# 2. 运行: docker-compose -f docker-compose.standalone.yml up -d
#
# 镜像来源: Docker Hub
# 支持: linux/amd64, linux/arm64

services:
  # Backend - FastAPI with FFmpeg
  backend:
    image: YOUR_USERNAME/copy-video-backend:latest
    container_name: copy-video-backend
    volumes:
      - ./data/workspace:/app/workspace
      - ./data/db:/app/data
    environment:
      - PYTHONUNBUFFERED=1
      - TZ=Asia/Shanghai
    restart: unless-stopped
    networks:
      - copy-video-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend - Vue.js SPA
  frontend:
    image: YOUR_USERNAME/copy-video-frontend:latest
    container_name: copy-video-frontend
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - copy-video-network

  # Nginx - Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: copy-video-nginx
    ports:
      - "3799:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - copy-video-network

networks:
  copy-video-network:
    driver: bridge
