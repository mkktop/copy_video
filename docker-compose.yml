version: '3.8'

services:
  # Backend - FastAPI with FFmpeg
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: copy-video-backend
    volumes:
      - ./data/workspace:/app/workspace
      - ./data/db:/app/data
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    networks:
      - copy-video-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend - Vue.js SPA
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: copy-video-frontend
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - copy-video-network

  # Nginx - Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: copy-video-nginx
    ports:
      - "3799:80"  # 默认端口 3799
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - copy-video-network

networks:
  copy-video-network:
    driver: bridge

volumes:
  workspace-data:
  db-data:
