# 单镜像版本 - 用户使用
version: '3.8'

services:
  copy-video:
    image: mkktop/copy-video:latest
    container_name: copy-video
    restart: unless-stopped
    ports:
      - "3799:80"
    volumes:
      - ./data/workspace:/app/workspace
      - ./data/settings.json:/app/data/settings.json
    environment:
      - TZ=Asia/Shanghai
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
